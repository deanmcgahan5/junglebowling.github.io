<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
<title>Jungle Bowling</title>

<style>
html, body {
  margin:0;
  height:100%;
  background:#08130d;
  font-family:system-ui;
  overflow:hidden;
}
canvas {
  display:block;
  width:100vw;
  height:100vh;
  touch-action:none;
}
#ui {
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  background:#111c14;
  padding:12px;
  box-sizing:border-box;
  border-top:2px solid rgba(255,255,255,.1);
}
button {
  padding:10px;
  border-radius:10px;
  border:none;
  font-weight:bold;
}
#releaseBtn {
  width:100%;
  margin-top:8px;
}
input[type="range"] {
  width:100%;
}
#popup {
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%) scale(0);
  background:white;
  padding:20px;
  border-radius:14px;
  font-weight:bold;
  font-size:18px;
  text-align:center;
  box-shadow:0 10px 30px rgba(0,0,0,.4);
  transition:transform .3s ease;
}
#popup.show {
  transform:translate(-50%,-50%) scale(1);
}
</style>
</head>

<body>

<canvas id="c"></canvas>

<div id="popup">
Oh no! Your bowling ball is stuck in monkey poop!
</div>

<div id="ui">
Spin
<input id="spinSlider" type="range" min="-1.5" max="1.5" step="0.01" value="0">
<button id="releaseBtn">Release 🎳</button>
</div>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");
const popup = document.getElementById("popup");

function resize(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener("resize", resize);
resize();

const ASSETS = {
  tree:'assets/tree.png',
  monkey:'assets/monkey.png',
  poop:'assets/poop.png',
  boar:'assets/runner_boar.png',
  parrot:'assets/runner_parrot.png',
  ball:'assets/ball.png'
};

const images = {};
function loadImage(url){
  return new Promise(res=>{
    const img = new Image();
    img.onload=()=>res(img);
    img.src=url;
  });
}

async function loadAssets(){
  for(let k in ASSETS){
    images[k]=await loadImage(ASSETS[k]);
  }
}

const state = {
  spin:0,
  aiming:true,
  aimPhase:0,
  shot:false
};

const ball = {x:0,y:0,vx:0,vy:0,r:20,alive:true};

let poopBlocks=[];

document.getElementById("spinSlider").addEventListener("input",e=>{
  state.spin=parseFloat(e.target.value);
});

document.getElementById("releaseBtn").addEventListener("click",()=>{
  if(state.shot) return;
  shoot();
});

function shoot(){
  state.shot=true;
  state.aiming=false;
  ball.vy=-500;
  const center=canvas.width/2;
  const offset=(ball.x-center)/(canvas.width/2);
  ball.vx=offset*250;
}

function resetBall(){
  ball.x=canvas.width/2;
  ball.y=canvas.height-100;
  ball.vx=0;
  ball.vy=0;
  ball.alive=true;
  state.shot=false;
  state.aiming=true;
}

function showPopup(){
  popup.classList.add("show");
  setTimeout(()=>{
    popup.classList.remove("show");
    resetBall();
  },2000);
}

function spawnPoop(x,y){
  poopBlocks.push({x,y,r:30});
}

function update(dt){
  if(state.aiming){
    state.aimPhase+=dt*2;
    ball.x=canvas.width/2 + Math.sin(state.aimPhase)*200;
  }

  if(state.shot && ball.alive){
    ball.vx+=state.spin*200*dt;
    ball.x+=ball.vx*dt;
    ball.y+=ball.vy*dt;

    if(ball.y<50){
      resetBall();
    }

    for(let p of poopBlocks){
      const dx=ball.x-p.x;
      const dy=ball.y-p.y;
      if(Math.hypot(dx,dy)<ball.r+p.r){
        ball.alive=false;
        showPopup();
      }
    }
  }
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  // background
  ctx.fillStyle="#0d2014";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  // trees
  ctx.drawImage(images.tree,0,100,200,300);
  ctx.drawImage(images.tree,canvas.width-200,120,200,300);

  // monkeys
  ctx.drawImage(images.monkey,50,80,150,150);
  ctx.drawImage(images.monkey,canvas.width-200,90,150,150);

  // poop blocks
  for(let p of poopBlocks){
    ctx.drawImage(images.poop,p.x-40,p.y-40,80,80);
  }

  // ball
  if(ball.alive)
    ctx.drawImage(images.ball,ball.x-40,ball.y-40,80,80);
}

let last=performance.now();
function loop(t){
  const dt=(t-last)/1000;
  last=t;
  update(dt);
  draw();
  requestAnimationFrame(loop);
}

(async()=>{
  await loadAssets();
  resetBall();
  spawnPoop(canvas.width/2,canvas.height/2);
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
