<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="220" height="220" viewBox="0 0 220 220">
  <defs>
    <radialGradient id="fur" cx="35%" cy="30%" r="75%">
      <stop offset="0" stop-color="#f0c28f"/>
      <stop offset="1" stop-color="#9a6a3b"/>
    </radialGradient>
    <radialGradient id="butt" cx="40%" cy="40%" r="70%">
      <stop offset="0" stop-color="#ff9ab1"/>
      <stop offset="1" stop-color="#cc4d6a"/>
    </radialGradient>
    <filter id="shadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="4" stdDeviation="3" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <g filter="url(#shadow)" stroke="#3a220f" stroke-width="6" stroke-linejoin="round" stroke-linecap="round">
    <!-- tail -->
    <path d="M168 78c26 10 32 44 8 58-14 8-28 2-34-10" fill="none" stroke="#7a4b26" stroke-width="10"/>
    <path d="M176 86c18 10 16 28 2 34" fill="none" stroke="#caa06a" stroke-width="6" opacity="0.7"/>

    <!-- body -->
    <ellipse cx="108" cy="126" rx="56" ry="50" fill="url(#fur)"/>
    <!-- BIG BUTT cheeks -->
    <ellipse cx="78" cy="150" rx="34" ry="30" fill="url(#butt)"/>
    <ellipse cx="138" cy="150" rx="34" ry="30" fill="url(#butt)"/>
    <path d="M108 146c-6 10-18 16-30 16" fill="none" stroke="#7a2436" stroke-width="6" opacity="0.6"/>
    <path d="M108 146c6 10 18 16 30 16" fill="none" stroke="#7a2436" stroke-width="6" opacity="0.6"/>

    <!-- head -->
    <circle cx="108" cy="72" r="42" fill="url(#fur)"/>
    <!-- face -->
    <ellipse cx="108" cy="82" rx="32" ry="26" fill="#f7d7b6"/>
    <path d="M92 88c10 14 26 14 36 0" fill="none" stroke="#6b3c1d" stroke-width="6"/>
    <circle cx="92" cy="66" r="6" fill="#111"/>
    <circle cx="124" cy="66" r="6" fill="#111"/>
    <circle cx="90" cy="64" r="2" fill="#fff"/>
    <circle cx="122" cy="64" r="2" fill="#fff"/>
    <path d="M104 74c2 6 10 6 12 0" fill="none" stroke="#6b3c1d" stroke-width="6" stroke-linecap="round"/>

    <!-- limbs -->
    <path d="M58 122c-18 10-24 28-16 42" fill="none" stroke="#7a4b26" stroke-width="12"/>
    <path d="M160 122c18 10 24 28 16 42" fill="none" stroke="#7a4b26" stroke-width="12"/>
    <path d="M84 174c-10 14-6 26 10 30" fill="none" stroke="#7a4b26" stroke-width="12"/>
    <path d="M132 174c10 14 6 26-10 30" fill="none" stroke="#7a4b26" stroke-width="12"/>
